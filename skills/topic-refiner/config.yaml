# Topic Refiner 领域配置
# 按需扩展你的研究领域和示例

domains:

  # ─────────────────────────────────────────────
  # 工程与技术
  # ─────────────────────────────────────────────
  深度学习:
    description: 深度学习/机器学习/AI方向
    subdomains:
      - 大语言模型
      - 计算机视觉
      - 多模态学习
      - 推荐系统
      - 强化学习
      - 生成模型
      - 模型压缩
      - 图神经网络
      - 可解释性
      - 小样本学习
    examples:
      - subdomain: 大语言模型
        step1: 大语言模型的推理能力
        step2_why: 为什么有的LLM在数学推理上表现好，有的却很差
        step2_what: 模型架构、训练数据质量、对齐方法、思维链提示策略
        step2_how: 训练数据中的推理模式如何被模型编码并在推理时激活
        step3: AI研究者设计更强推理能力的模型，教育领域应用AI辅助教学
        who: 主流开源LLM（LLaMA/Qwen/Mistral）
        when: 2023-2025年发布的模型
        where: 数学推理基准（GSM8K/MATH）
        what: 不同提示策略对推理准确率的影响
        question: 不同提示策略如何影响大语言模型在数学推理任务上的表现？

      - subdomain: 小样本学习
        step1: 小样本场景下的模型迁移
        step2_why: 为什么有的预训练策略在小样本场景能保持高性能，有的却严重退化
        step2_what: 预训练数据分布、架构设计、特征对齐方式、源域与目标域的语义距离
        step2_how: 源域与目标域的语义距离如何影响特征复用程度，进而决定迁移效率
        step3: 研究者设计数据稀缺场景的鲁棒预训练策略，帮助工业界降低标注成本
        who: ViT-Base / ResNet-50
        when: 微调阶段
        where: 医疗影像（胸部X光）
        what: 10-shot下的分类准确率
        question: 预训练数据集的语义距离如何影响ViT模型在10-shot医疗影像分类中的迁移效率？

      - subdomain: 可解释性
        step1: 深度学习模型的决策解释
        step2_why: 为什么有的可解释性方法能准确反映决策依据，有的解释却与模型内部严重不符
        step2_what: 解释方法的假设前提、模型非线性程度、任务类型
        step2_how: 梯度方法和扰动方法在解释高度非线性模型时各自的系统性偏差
        step3: AI安全研究者评估高风险场景（医疗、司法）中的模型可信度
        who: Transformer分类器
        when: 推理阶段
        where: 医疗诊断辅助决策
        what: 解释与模型梯度的一致性（忠实度）
        question: 梯度类可解释性方法对Transformer模型医疗诊断决策的解释忠实度如何量化评估？

  遥感与地球科学:
    description: 遥感、高光谱、地球科学方向
    subdomains:
      - 土壤属性预测
      - 植被监测
      - 地物分类
      - 变化检测
      - 大气反演
    examples:
      - subdomain: 土壤属性预测
        step1: 高光谱遥感土壤属性反演
        step2_why: 为什么有的迁移学习方法在跨地区土壤预测中效果好，有的却严重退化
        step2_what: 源域与目标域土壤类型差异、光谱预处理方式、物理先验的使用
        step2_how: 物理约束如何弥补跨域数据分布差异，进而提升小样本迁移精度
        step3: 土壤科学家在数据稀缺地区快速获得高质量土壤碳估算
        who: 高光谱地物光谱数据集
        when: 近十年
        where: 跨大洲（欧洲→亚洲）迁移场景
        what: 小样本条件下的SOC预测精度
        question: 物理先验注入如何影响高光谱模型在跨大洲小样本土壤有机碳预测中的迁移效果？

  # ─────────────────────────────────────────────
  # 自然科学
  # ─────────────────────────────────────────────
  生态学:
    description: 生态学、环境科学方向
    subdomains:
      - 物种适应性
      - 生态系统服务
      - 生物多样性
      - 污染物效应
    examples:
      - subdomain: 物种适应性
        step1: 气候变化对物种分布的影响
        step2_why: 为什么有的物种能快速适应气候变化，有的却面临灭绝威胁
        step2_what: 遗传多样性、繁殖周期、食物来源灵活性、栖息地连通性
        step2_how: 遗传多样性如何通过表型可塑性决定种群在温度变化下的存活率
        step3: 生态保护政策制定者识别高风险物种，优先分配保护资源
        who: 两栖类动物
        when: 近30年
        where: 中国南方湿地
        what: 繁殖成功率与温度的关系
        question: 近30年气温升高如何影响中国南方湿地两栖类动物的繁殖成功率？

  医学与公共卫生:
    description: 医学、流行病、公共卫生方向
    subdomains:
      - 治疗响应
      - 流行病学
      - 健康行为
      - 医疗资源配置
    examples:
      - subdomain: 治疗响应
        step1: 癌症靶向治疗效果
        step2_why: 为什么接受相同靶向治疗的患者，有的完全缓解，有的却很快出现耐药
        step2_what: 肿瘤微环境、基因突变谱、免疫系统状态、给药时间窗
        step2_how: 肿瘤微环境中的免疫细胞浸润程度如何调节靶向药物的疗效
        step3: 临床医生识别治疗响应预测标志物，为患者制定个性化方案
        who: 非小细胞肺癌患者
        when: 一线治疗的前12个月
        where: 某三甲医院肿瘤科
        what: 耐药时间（PFS）
        question: 肿瘤微环境中T细胞浸润程度能否预测非小细胞肺癌靶向治疗的耐药时间？

  # ─────────────────────────────────────────────
  # 社会科学
  # ─────────────────────────────────────────────
  教育学:
    description: 教育研究方向
    subdomains:
      - 课程设计
      - 教学方法
      - 教育技术
      - 学习心理
      - 教育评估
    examples:
      - subdomain: 教育技术
        step1: 在线教学效果
        step2_why: 为什么有的学生网课学习效果好，有的却很差
        step2_what: 自律性、课程设计质量、家庭学习环境、师生互动频率
        step2_how: 学习环境如何通过影响注意力和参与度进而影响学习效果
        step3: 高校管理者改进在线教学设计，学生提升远程学习效率
        who: 大学生
        when: 疫情期间（2020-2022）
        where: 某高校
        what: 影响网课学习效果的因素
        question: 什么因素影响了大学生在疫情期间的网课学习效果？

  经济学:
    description: 经济研究方向
    subdomains:
      - 劳动经济学
      - 发展经济学
      - 行为经济学
      - 产业组织
      - 国际贸易
    examples:
      - subdomain: 劳动经济学
        step1: 劳动力市场的性别不平等
        step2_why: 为什么有的行业性别薪酬差距极小，有的行业差距却高达30%以上
        step2_what: 职业性别隔离程度、工会覆盖率、弹性工作制度
        step2_how: 行业特征如何通过影响谈判地位和职业发展路径，决定薪酬差距
        step3: 政策制定者识别最需要干预的行业，企业HR设计更公平的薪酬体系
        who: 本科及以上学历城市白领
        when: 2015-2023年
        where: 一线城市金融和科技行业
        what: 同岗位同资历下的时薪差异
        question: 一线城市金融与科技行业中，同资历男女白领的时薪差距如何随职级变化？

  政治学:
    description: 政治学、公共管理方向
    subdomains:
      - 政策执行
      - 选举行为
      - 官僚体制
      - 国际关系
    examples:
      - subdomain: 政策执行
        step1: 地方政府政策执行力度
        step2_why: 为什么同一项中央政策，有的省份执行到位，有的省份却大打折扣
        step2_what: 官员激励结构、地方财政能力、政策与地方利益的匹配程度
        step2_how: 官员激励和地方财政如何共同影响政策落地质量
        step3: 政策设计者理解执行障碍，改进配套激励机制
        who: 县级政府
        when: 2010-2020年
        where: 中部某省
        what: 环保政策执行合规率
        question: 中部地区县级政府的环保政策执行力度受哪些因素影响？
